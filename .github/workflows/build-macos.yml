name: Build macOS

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build for macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install build tools
        run: |
          brew install automake libtool pkg-config

      - name: Build dependencies
        run: |
          make -C depends -j$(sysctl -n hw.ncpu)

      - name: Build Taler
        run: |
          ./autogen.sh
          HOST_TRIPLET=$(cd depends && ./config.guess)
          CONFIG_SITE=$PWD/depends/${HOST_TRIPLET}/share/config.site \
            ./configure --prefix=/ --with-incompatible-bdb
          make -j$(sysctl -n hw.ncpu)

      - name: Create bin directory and copy binaries
        run: |
          mkdir -p bin
          cp src/talerd bin/ || true
          cp src/taler-cli bin/ || true
          cp src/taler-tx bin/ || true
          cp src/qt/taler-qt bin/ || true

      - name: Verify binaries
        run: |
          ls -lh bin/
          file bin/talerd
          file bin/taler-qt
          echo "=== Checking dynamic library dependencies ==="
          otool -L bin/taler-qt | head -20
          echo "=== Verifying no Homebrew library dependencies ==="
          if otool -L bin/taler-qt | grep -q "/opt/homebrew\|/usr/local/opt"; then
            echo "ERROR: Non-system dynamic libraries found!"
            exit 1
          fi
          echo "OK: All libraries are system-only"

      - name: Create release archive
        if: github.event_name != 'pull_request'
        run: |
          cd bin
          tar -czf taler-${{ github.ref_name }}-macos-arm64.tar.gz talerd taler-cli taler-tx taler-qt
          cd ..

      - name: Upload artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: taler-${{ github.ref_name }}-macos-arm64
          path: bin/taler-${{ github.ref_name }}-macos-arm64.tar.gz
          retention-days: 365

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/taler-${{ github.ref_name }}-macos-arm64.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
